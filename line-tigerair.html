<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tigerair Line Demo Flow</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #ffffff;
    font-family: "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 24px;
    min-height: 100vh;
  }

  /* Keyboard hint */
  .kb-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    z-index: 9999;
  }
  .kb-hint .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .kb-hint .step-indicator {
    margin-left: 8px;
    padding-left: 10px;
    border-left: 1px solid #444;
    color: #ff944d;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 9999;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .hint.hidden { opacity: 0; }

  /* iPhone frame */
  .phone {
    width: 380px;
    height: 800px;
    background: #1a1a1a;
    border-radius: 56px;
    padding: 12px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 2px #2a2a2a;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    border-radius: 56px;
    box-shadow: inset 0 0 0 4px #3a3a3a;
    pointer-events: none;
    z-index: 100;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #fff;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Dynamic island */
  .island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 116px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    pointer-events: none;
  }

  /* Status bar */
  .status-bar {
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 28px;
    color: #000;
    font-size: 15px;
    font-weight: 600;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }
  .status-bar .right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .battery {
    width: 24px;
    height: 12px;
    border: 1px solid #000;
    border-radius: 3px;
    position: relative;
    padding: 1px;
  }
  .battery::after {
    content: "";
    position: absolute;
    right: -3px;
    top: 3px;
    width: 2px;
    height: 4px;
    background: #000;
    border-radius: 0 1px 1px 0;
  }
  .battery .fill {
    width: 90%;
    height: 100%;
    background: #34c759;
    border-radius: 1px;
  }

  /* ===== Screen states ===== */
  .stage { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .stage.active { display: flex; }

  /* ===== Add Friend Screen ===== */
  .add-friend {
    background: #fff;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 24px 30px;
  }
  .add-friend .line-logo {
    text-align: center;
    margin-top: 20px;
    margin-bottom: 50px;
  }
  .add-friend .line-logo .word {
    font-size: 36px;
    font-weight: 900;
    color: #06c755;
    letter-spacing: 2px;
  }
  .friend-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .friend-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: #ff6e14;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    box-shadow: 0 4px 12px rgba(255,110,20,0.3);
  }
  .friend-avatar .t-mark {
    color: #fff;
    font-size: 48px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -2px;
  }
  .friend-name {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .friend-name .verified-badge {
    width: 18px;
    height: 18px;
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .friend-sub {
    font-size: 12px;
    color: #888;
    margin-bottom: 30px;
  }
  .friend-actions {
    width: 100%;
    margin-top: auto;
  }
  .btn-add-friend {
    display: block;
    width: 100%;
    background: #06c755;
    color: #fff;
    text-align: center;
    padding: 14px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add-friend:hover { background: #05b34c; }
  .btn-cancel {
    display: block;
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-top: 14px;
    text-decoration: none;
  }

  /* ===== Chat Screen ===== */
  .chat-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Line header */
  .line-header {
    padding: 6px 14px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1a1a1a;
    background: rgba(255,255,255,0.0);
    flex-shrink: 0;
  }
  .line-header .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .line-header .title {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    font-weight: 600;
    overflow: hidden;
    white-space: nowrap;
  }
  .verified {
    width: 16px;
    height: 16px;
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    background:
      radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 90%, rgba(255,255,255,0.5) 0%, transparent 50%),
      linear-gradient(180deg, #a8c5e3 0%, #c5d9ec 70%, #d8e5f0 100%);
    padding: 8px 14px 10px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }
  .chat-area .tap-hint {
    position: sticky;
    bottom: 8px;
    text-align: center;
    margin-top: 10px;
    font-size: 11px;
    color: #4a5a6c;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
    padding: 5px 12px;
    border-radius: 12px;
    display: inline-block;
    left: 50%;
    transform: translateX(-50%);
    animation: bob 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  .tap-hint-wrap {
    position: sticky;
    bottom: 8px;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Welcome banner */
  .system-banner {
    text-align: center;
    margin: 10px auto 14px;
    font-size: 11px;
    color: #4a5a6c;
    background: rgba(255,255,255,0.5);
    padding: 4px 14px;
    border-radius: 12px;
    width: fit-content;
  }

  /* Message group */
  .msg-group {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: flex-start;
    animation: fadeUp 0.4s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #ff6e14;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -1px;
  }

  .msg-content {
    flex: 1;
    min-width: 0;
    max-width: calc(100% - 48px);
  }
  .timestamp {
    font-size: 10px;
    color: #5a6b7d;
    margin-top: 2px;
    margin-left: 4px;
  }

  /* Typing indicator */
  .typing {
    background: #fff;
    border-radius: 16px;
    padding: 12px 16px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .typing .dot {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    animation: typingDot 1.4s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { transform: scale(0.7); opacity: 0.5; }
    30% { transform: scale(1); opacity: 1; }
  }

  /* Text bubble */
  .text-bubble {
    background: #fff;
    border-radius: 4px 16px 16px 16px;
    padding: 10px 14px;
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.5;
    display: inline-block;
    max-width: 100%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    word-wrap: break-word;
  }

  /* Rich card (for 搶票通知) */
  .rich-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    max-width: 260px;
  }
  .rich-card .hero {
    height: 130px;
    background:
      linear-gradient(135deg, rgba(255,110,20,0.85) 0%, rgba(220,60,20,0.85) 100%),
      linear-gradient(180deg, #ff944d, #c74f00);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px;
    color: #fff;
    overflow: hidden;
  }
  .rich-card .hero::before {
    content: "";
    position: absolute;
    right: -30px;
    bottom: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .rich-card .hero::after {
    content: "";
    position: absolute;
    right: 30px;
    top: -20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .rich-card .hero .tag {
    background: #fff;
    color: #ff6e14;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 3px;
    align-self: flex-start;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .rich-card .hero .h1 {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.2;
    position: relative;
    z-index: 1;
    letter-spacing: 1px;
  }
  .rich-card .hero .h2 {
    font-size: 12px;
    opacity: 0.95;
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }
  .rich-card .body {
    padding: 14px;
  }
  .rich-card .route-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .rich-card .route-line .city {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .rich-card .route-line .arr {
    color: #ff6e14;
  }
  .rich-card .price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 12px;
  }
  .rich-card .price-row .label {
    font-size: 11px;
    color: #888;
  }
  .rich-card .price-row .currency {
    font-size: 13px;
    color: #ff6e14;
    font-weight: 700;
  }
  .rich-card .price-row .price {
    font-size: 26px;
    color: #ff6e14;
    font-weight: 900;
    line-height: 1;
  }
  .rich-card .price-row .qi {
    font-size: 12px;
    color: #888;
  }
  .rich-card .desc {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .rich-card .btn-primary {
    display: block;
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 11px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
  }

  /* ===== Price Alert Card (step 2) ===== */
  .alert-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    max-width: 260px;
    border: 1px solid #f0f0f0;
  }
  .alert-head {
    background: #0f172a;
    color: #fff;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: 0.5px;
  }
  .alert-head-l {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert-pulse {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(34,197,94,0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
    70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  .alert-time {
    color: #94a3b8;
    font-weight: 500;
    font-size: 10px;
  }
  .alert-body {
    padding: 14px;
  }
  .alert-personal {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 8px;
  }
  .alert-route {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .alert-sub {
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px dashed #e5e7eb;
  }
  .alert-route .ar-city {
    font-size: 18px;
    font-weight: 900;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }
  .alert-route .ar-date {
    margin-left: auto;
    background: #fff3eb;
    color: #ff6e14;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .alert-pricewrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .alert-now { flex: 1; }
  .alert-was { flex: 1; text-align: right; }
  .alert-now .al, .alert-was .al {
    font-size: 10px;
    color: #94a3b8;
    margin-bottom: 2px;
  }
  .alert-now .av {
    display: flex;
    align-items: baseline;
    gap: 2px;
  }
  .alert-now .av .cur {
    font-size: 12px;
    color: #ff6e14;
    font-weight: 700;
  }
  .alert-now .av .num {
    font-size: 26px;
    color: #ff6e14;
    font-weight: 900;
    line-height: 1;
  }
  .alert-was .av-was {
    font-size: 14px;
    color: #94a3b8;
    text-decoration: line-through;
    font-weight: 600;
  }
  .alert-drop {
    background: #dcfce7;
    color: #15803d;
    padding: 4px 6px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 11px;
    font-weight: 800;
    line-height: 1;
    gap: 1px;
  }

  /* Chart */
  .chart {
    background: #f8fafc;
    border-radius: 6px;
    padding: 10px 10px 6px;
    margin-bottom: 12px;
  }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 50px;
  }
  .chart-bars .bar {
    flex: 1;
    background: #e2e8f0;
    border-radius: 2px 2px 0 0;
    position: relative;
    min-height: 4px;
  }
  .chart-bars .bar.active {
    background: #ff6e14;
  }
  .chart-bars .bdot {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #ff6e14;
    border: 1.5px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 2px #ff6e14;
  }
  .chart-axis {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #94a3b8;
    margin-top: 6px;
  }
  .alert-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .meta-pill {
    background: #f1f5f9;
    color: #475569;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .meta-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .meta-pill .dot-low { background: #22c55e; }
  .meta-pill .dot-fire { background: #ef4444; }
  .alert-btn {
    display: block;
    background: #ff6e14;
    color: #fff;
    text-align: center;
    padding: 11px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
  }

  /* Check-in card */
  .checkin-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    max-width: 260px;
  }
  .checkin-card .banner {
    background: #ff6e14;
    color: #fff;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .checkin-card .body {
    padding: 14px;
  }
  .checkin-card .subtitle {
    font-size: 13px;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .checkin-card .title {
    font-size: 17px;
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.35;
    margin-bottom: 10px;
  }
  .checkin-card .title .accent { color: #ff6e14; }
  .checkin-card .divider {
    height: 1px;
    background: #ececec;
    margin: 8px 0 10px;
  }
  .checkin-card .meta {
    font-size: 11px;
    color: #999;
    margin-bottom: 2px;
  }
  .checkin-card .meta-val {
    font-size: 13px;
    color: #1a1a1a;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .checkin-card .info {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .checkin-card .info strong { color: #1a1a1a; }
  .checkin-card .btn {
    display: block;
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 11px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
  }
  .checkin-card .footer-note {
    background: #fafafa;
    color: #999;
    font-size: 11px;
    padding: 9px 14px;
    line-height: 1.5;
  }

  /* Carousel */
  .carousel-wrap {
    max-width: 100%;
    overflow: hidden;
  }
  .carousel-label {
    font-size: 12px;
    color: #1a1a1a;
    font-weight: 600;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .carousel {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .carousel::-webkit-scrollbar { height: 4px; }
  .carousel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
  .ccard {
    flex: 0 0 200px;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;

        <div class="msg-content">
          <div class="typing">

        resolve();

    });
  }

  function updateInd() {
    stepInd.textContent = currentStep + ' / ' + TOTAL;
  }

  // Render a step instantly (no typing animation) — for rebuilding state
  function renderInstant(n) {
    if (n === 1) {
      document.getElementById('stage-add').classList.remove('active');
      document.getElementById('stage-chat').classList.add('active');
    } else if (n === 2) {
      runStep1Instant();
    } else if (n === 3) {
      runStep2Instant();
    } else if (n === 4) {
      runStep3Instant();
    } else if (n === 5) {
      runStep4Instant();
    }
  }

  // Forward — advance one step (with typing animation)
  async function nextStep() {
    if (isRunning) return;
    if (currentStep >= TOTAL) return;
    isRunning = true;
    const n = currentStep + 1;

    if (n === 1) {
      document.getElementById('stage-add').classList.remove('active');
      document.getElementById('stage-chat').classList.add('active');
    } else if (n === 2) {
      await runStep1();
    } else if (n === 3) {
      await runStep2();
    } else if (n === 4) {
      await runStep3();
    } else if (n === 5) {
      await runStep4();
    }
    currentStep = n;
    updateInd();
    isRunning = false;
  }

  // Backward — go back one step (clear chat + replay instantly to target)
  function prevStep() {
    if (isRunning) return;
    if (currentStep <= 0) return;
    const target = currentStep - 1;

    if (target === 0) {
      // Back to add-friend stage
      document.getElementById('stage-chat').classList.remove('active');
      document.getElementById('stage-add').classList.add('active');
      chatArea.innerHTML = '<div class="system-banner">您已加入 tigerair 台灣虎航 為好友</div>';

      // Reset chat and re-render up to target
      chatArea.innerHTML = '<div class="system-banner">您已加入 tigerair 台灣虎航 為好友</div>';
      document.getElementById('stage-add').classList.remove('active');
      document.getElementById('stage-chat').classList.add('active');
      for (let i = 2; i <= target; i++) {
        renderInstant(i);
      }
    }
    currentStep = target;
    updateInd();
  }

    nextStep();

      nextStep();

      e.preventDefault();
      prevStep();
    } else if (e.key === 'r' || e.key === 'R') {
      location.reload();
    }
  });
